{% load static %}
{% load musicforum_tags %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{ title|default:"Форум"|capfirst }}</title>
    <link rel="stylesheet" href="{% static 'musicforum/css/styles.css' %}">
</head>
<body>
    <header class="site-header">
        <h1>{% forum_name %}</h1>
        <nav>
            <ul class="menu">
                {% for item in menu %}
                    <li><a href="{% url item.url_name %}">{{ item.title }}</a></li>
                {% endfor %}
            </ul>
        </nav>
    </header>

    <aside class="sidebar">
        <h3>Рубрики</h3>
        {% show_categories current_category %}
    </aside>

    <main class="content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>Год: {% now "Y" %}</p>
    </footer>
</body>
</html>
